<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMITADORA - Web Owner: Andrey</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #ffffff; /* background putih polos */
    color: #333;
  }

  /* Header */
  header {
    background-color: #ff0000;
    color: white;
    padding: 40px 0;
    text-align: center;
    position: relative;
  }
  header h1 { font-size: 2.5em; margin: 0; letter-spacing: 2px; }
  header p { font-size: 1.1em; margin-top: 5px; font-style: italic; }
  .tagline { margin-top: 10px; font-size: 1.1em; color: #ffe5e5; }

  /* Ornamen tetap, tidak mengganggu */
  .ornament-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .ornament {
    position: absolute;
    font-size: 2em;
    color: #ffe5e5;
    opacity: 0.7;
  }
  .ornament1 { top: 10px; left: 10%; }
  .ornament2 { top: 20px; right: 15%; }
  .ornament3 { bottom: 15px; left: 50%; transform: translateX(-50%); }

  /* Nav */
  nav {
    display: flex;
    justify-content: center;
    background-color: #cc0000;
  }
  nav a {
    color: white;
    padding: 14px 20px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
  }
  nav a:hover { background-color: #990000; }

  /* Section */
  section {
    padding: 25px 20px;
    max-width: 900px;
    margin: auto;
  }
  section h2 {
    color: #ff0000;
    margin-bottom: 15px;
    border-bottom: 2px solid #ff0000;
    padding-bottom: 5px;
  }

  /* Ramadhan Banner */
  .ramadhan {
    background-color: #ffe5e5;
    border-left: 6px solid #ff0000;
    padding: 12px 15px;
    margin: 15px 0;
    border-radius: 5px;
    font-style: italic;
    font-size: 1.1em;
    text-align: center;
  }
