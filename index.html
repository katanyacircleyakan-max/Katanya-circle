<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #800000; /* merah tua */
    }

    header {
      background: #ff4d4d; /* merah cerah */
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    header p {
      font-size: 1.2em;
      margin-top: 10px;
      font-style: italic;
    }

    section {
      padding: 30px 20px;
      max-width: 800px;
      margin: auto;
    }

    h2 {
      text-align: center;
      color: #ff4d4d;
    }

    ul {
      list-style: none;
      padding: 0;
      text-align: center;
    }

    ul li {
      background: #ffe6e6;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      font-size: 1.2em;
      font-weight: bold;
      display: inline-block;
      min-width: 150px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #ff4d4d;
      color: white;
      font-weight: bold;
    }

    .quote {
      text-align: center;
      font-style: italic;
      margin-bottom: 20px;
      font-size: 1.1em;
    }

    .marhaban {
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      margin-bottom: 30px;
      color: #800000;
    }
  </style>
</head>
<body>

  <header>
    <h1>Circle</h1>
    <p>"Marhaban ya Ramadhan, bulan penuh berkah dan rahmat"</p>
  </header>

  <section>
    <div class="marhaban">Marhaban ya Ramadhan untuk anggota:</div>
    <ul>
      <li>Syukron</li>
      <li>Wildan</li>
      <li>Riski Wonokusumo</li>
      <li>Akbar</li>
      <li>Zahir</li>
      <li>Faiz</li>
      <li>Andrey</li>
    </ul>

    <div class="quote">
      "Circle ini bukan sembarang circle, tempat berkumpulnya teman dan berkah Ramadhan"
    </div>
  </section>

  <footer>
    Owner: Andrey
  </footer>

</body>
</html>
